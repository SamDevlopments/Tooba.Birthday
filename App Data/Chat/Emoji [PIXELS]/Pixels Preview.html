<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Cloud · emoji gallery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1e1e2f;
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 1300px;
      width: 100%;
    }

    /* category card */
    .item {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      padding: 1.8rem 1.5rem 2rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #f0e9d8;
      margin-bottom: 1.8rem;
      padding-left: 0.5rem;
      border-left: 6px solid;
      padding-left: 1rem;
    }

    /* color accents per category – matches the spirit of the original */
    .item:nth-child(1) h1 { border-color: #ff4d6d; }   /* red */
    .item:nth-child(2) h1 { border-color: #f77f00; }   /* orange */
    .item:nth-child(3) h1 { border-color: #fcbf49; }   /* yellow */
    .item:nth-child(4) h1 { border-color: #06d6a0; }   /* green */
    .item:nth-child(5) h1 { border-color: #118ab2; }   /* blue */
    .item:nth-child(6) h1 { border-color: #9c89b8; }   /* purple */
    .item:nth-child(7) h1 { border-color: #f8a5c2; }   /* pink */
    .item:nth-child(8) h1 { border-color: #b5838d; }   /* brown */
    .item:nth-child(9) h1 { border-color: #6c757d; }   /* black */
    .item:nth-child(10) h1 { border-color: #adb5bd; }  /* gray */
    .item:nth-child(11) h1 { border-color: #f4f1de; }  /* white */
    .item:nth-child(12) h1 { border: none; background: linear-gradient(90deg, #ff4d6d, #f77f00, #fcbf49, #06d6a0, #118ab2, #9c89b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; } /* rainbow */
    .item:nth-child(13) h1 { border-color: #e0aaff; }  /* pairs */
    .item:nth-child(14) h1 { border-color: #caf0f8; }  /* misc */
    .item:nth-child(15) h1 { border-color: #ff99c8; }  /* hello kitty */
    .item:nth-child(16) h1 { border-color: #f9c6c9; }  /* my melody */
    .item:nth-child(17) h1 { border-color: #b298dc; }  /* kuromi */

    /* emoji grid */
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 0.9rem;
      justify-items: center;
      align-items: center;
    }

    /* each image behaves like an emoji button */
    .emoji-btn {
      width: 68px;
      height: 68px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 6px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.25);
    }

    .emoji-btn:hover {
      transform: scale(1.12);
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 12px 20px rgba(0, 0, 0, 0.5);
      z-index: 2;
    }

    .emoji-btn img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 12px;
      image-rendering: auto;
      pointer-events: none;  /* click handled by button */
    }

    /* small responsive tweaks */
    @media (max-width: 500px) {
      body {
        padding: 0.8rem;
      }
      .item {
        padding: 1.2rem 0.8rem 1.5rem;
      }
      .emoji-grid {
        grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
        gap: 0.6rem;
      }
      .emoji-btn {
        width: 58px;
        height: 58px;
      }
    }
  </style>
</head>

    const container = document.querySelector('.container');
    if (!container) return;

    function buildGallery() {
      container.innerHTML = '';
      categories.forEach(cat => {
        const section = document.createElement('div');
        section.className = 'item';

        const heading = document.createElement('h1');
        heading.textContent = cat.name;
        section.appendChild(heading);

        const grid = document.createElement('div');
        grid.className = 'emoji-grid';

        cat.images.forEach(url => {
          const btn = document.createElement('button');
          btn.className = 'emoji-btn';
          btn.setAttribute('data-url', url);
          btn.title = 'Click to copy / use as emoji';

          const img = document.createElement('img');
          img.src = url;
          img.alt = cat.name + ' pixel';
          img.loading = 'lazy';

          btn.appendChild(img);

          // ---- CLICK BEHAVIOUR FOR CHAT IMPLEMENTATION ----
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            const imageUrl = btn.getAttribute('data-url');
            // This is where you hook into your chat app.
            // For now, we copy the URL to clipboard and show a tiny feedback.
            navigator.clipboard.writeText(imageUrl).then(() => {
              // Visual feedback: brief background flash
              btn.style.backgroundColor = 'rgba(255,255,255,0.3)';
              setTimeout(() => { btn.style.backgroundColor = ''; }, 150);
              console.log('📋 Copied emoji URL:', imageUrl);
              // If you have a global function to insert into chat, call it here:
              // e.g., window.insertChatEmoji(imageUrl);
            }).catch(err => {
              console.warn('Clipboard copy failed', err);
              // Fallback: still log and could trigger chat insert
            });

            // EXAMPLE: if your app exposes a function like addEmojiToInput(url)
            if (typeof window.addEmojiToChat === 'function') {
              window.addEmojiToChat(imageUrl);
            }
          });

          grid.appendChild(btn);
        });

        section.appendChild(grid);
        container.appendChild(section);
      });
    }

    buildGallery();

    // Optional: expose a global helper for chat integration
    window.insertEmojiIntoChat = function(url) {
      console.log('✨ Emoji selected for chat:', url);
      // Your chat logic here: e.g., append <img> to message input or send directly.
    };

  })();
</script>
